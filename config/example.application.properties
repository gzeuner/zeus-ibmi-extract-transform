# Example configuration for zeus-ibmi-extract-transform (no real credentials)
# Priority: CLI args > ENV > this file > defaults

# JDBC
# IBM i / JT400 example:
# db.driver=com.ibm.as400.access.AS400JDBCDriver
# db.url=jdbc:as400://YOUR_HOSTNAME;naming=sql;errors=full

# Local/H2 example for offline tests:
db.driver=org.h2.Driver
db.url=jdbc:h2:mem:demo;MODE=DB2;DB_CLOSE_DELAY=-1
db.user=sa

# Prefer password from ENV by name (recommended)
db.passwordEnv=ZEUS_IBMI_DB_PASSWORD
# Optional fallback (leave empty in committed examples)
db.password=
# For H2 demos this can stay true; for IBM i keep false and provide password via ENV.
db.allowEmptyPassword=true

# Read-only SQL only
query.sql=SELECT 1 AS ID, 'demo' AS NAME
# query.file=examples/queries/sample-customers.sql

# Output
output.directory=./output
output.formats=xml,json,jsonl,csv,md,html
output.html.theme=auto
# output.html.customCssFile=./styles/export-custom.css
output.html.includeManifest=true

# Run manifest
run.manifest.enabled=true

# Optional performance settings
query.fetchSize=200
query.timeoutSeconds=30
