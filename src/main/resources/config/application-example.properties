# Example configuration for local development (no real credentials).
db.driver=com.ibm.as400.access.AS400JDBCDriver
db.url=jdbc:as400://YOUR_HOSTNAME;naming=sql;errors=full
db.user=YOUR_USERNAME
db.passwordEnv=ZEUS_IBMI_DB_PASSWORD
# db.password=YOUR_PASSWORD
db.allowEmptyPassword=false

# Read-only SQL only.
query.sql=SELECT TABLE_SCHEMA, TABLE_NAME FROM QSYS2.SYSTABLES FETCH FIRST 10 ROWS ONLY
# query.file=examples/queries/sample-customers.sql

# Comma-separated output formats.
output.formats=xml,json,jsonl,csv,md
output.directory=./output
