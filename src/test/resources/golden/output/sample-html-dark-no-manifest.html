<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>zeus-ibmi-extract-transform Export</title>
  <style>
:root {
  color-scheme: dark;
--surface-bg: #0f141d;
--surface-card: #161f2c;
--surface-border: #2f3b50;
--text-main: #e6ecf8;
--text-muted: #a7b0c2;
--header-bg: #365fbe;
--header-text: #f7f9fd;
--row-hover: #8ab4f822;
--table-zebra: #111826;
--manifest-bg: #1a2538;
}
body {
  margin: 0;
  background: radial-gradient(circle at top right, #1d4ed811, transparent 48%), var(--surface-bg);
  color: var(--text-main);
  font-family: "Segoe UI", "Noto Sans", "Liberation Sans", sans-serif;
}
.export-wrap {
  max-width: 1200px;
  margin: 2rem auto;
  padding: 0 1rem;
}
.export-card {
  background: var(--surface-card);
  border: 1px solid var(--surface-border);
  border-radius: 0.9rem;
  box-shadow: 0 12px 28px #00000014;
  overflow: hidden;
}
.export-header {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--surface-border);
}
.export-title {
  margin: 0;
  font-size: 1.3rem;
  font-weight: 600;
}
.export-subtitle {
  margin: 0.35rem 0 0;
  color: var(--text-muted);
  font-size: 0.92rem;
}
.table-wrap {
  overflow-x: auto;
  padding: 0.9rem;
}
.export-table {
  width: 100%;
  border-collapse: collapse;
  border: 1px solid var(--surface-border);
  margin: 0;
}
.export-table th,
.export-table td {
  border: 1px solid var(--surface-border);
  color: var(--text-main);
  vertical-align: top;
  white-space: pre-wrap;
  word-break: break-word;
  padding: 0.55rem 0.65rem;
  text-align: left;
}
.export-table thead th {
  background: var(--header-bg);
  color: var(--header-text);
  font-weight: 600;
  position: sticky;
  top: 0;
}
.export-table tbody tr:nth-child(even) td {
  background: var(--table-zebra);
}
.export-table tbody tr:hover td {
  background: var(--row-hover);
}
.manifest-meta {
  border-top: 1px solid var(--surface-border);
  margin: 0;
  padding: 0.9rem 1.25rem 1.2rem;
  background: var(--manifest-bg);
}
.manifest-meta summary {
  cursor: pointer;
  font-weight: 600;
}
.manifest-meta pre {
  margin: 0.8rem 0 0;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text-main);
  font-size: 0.86rem;
}
  </style>
<style>
.export-title { letter-spacing: 0.04em; text-transform: uppercase; }
.export-card { border-width: 2px; }

</style>
</head>
<body>
<main class="export-wrap">
  <section class="export-card">
    <header class="export-header">
      <h1 class="export-title">IBM i / DB2 for i Query Export</h1>
      <p class="export-subtitle">Generated by zeus-ibmi-extract-transform | Rows: 2</p>
    </header>
    <div class="table-wrap">
      <table class="export-table">
        <thead>
          <tr>
            <th scope="col" title="JDBC Type: INTEGER">ID</th>
            <th scope="col" title="JDBC Type: VARCHAR">NAME</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Alice</td>
          </tr>
          <tr>
            <td>2</td>
            <td>Bob|Builder;&quot;X&quot;</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
</body>
</html>
