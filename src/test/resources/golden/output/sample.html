<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>zeus-ibmi-extract-transform Export</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      color-scheme: light dark;
      --surface-bg: #f6f8fb;
      --surface-card: #ffffff;
      --surface-border: #d4dceb;
      --text-main: #1f2937;
      --text-muted: #5b6577;
      --header-bg: #0d6efd;
      --header-text: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --surface-bg: #0f141d;
        --surface-card: #161f2c;
        --surface-border: #2f3b50;
        --text-main: #e6ecf8;
        --text-muted: #a7b0c2;
        --header-bg: #365fbe;
        --header-text: #f7f9fd;
      }
    }
    body {
      margin: 0;
      background: radial-gradient(circle at top right, #1d4ed811, transparent 48%), var(--surface-bg);
      color: var(--text-main);
      font-family: "Segoe UI", "Noto Sans", "Liberation Sans", sans-serif;
    }
    .export-wrap {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .export-card {
      background: var(--surface-card);
      border: 1px solid var(--surface-border);
      border-radius: 0.9rem;
      box-shadow: 0 12px 28px #00000014;
      overflow: hidden;
    }
    .export-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--surface-border);
    }
    .export-title {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 600;
    }
    .export-subtitle {
      margin: 0.35rem 0 0;
      color: var(--text-muted);
      font-size: 0.92rem;
    }
    .table-wrap {
      padding: 0.9rem;
    }
    .table {
      margin: 0;
      border-color: var(--surface-border);
    }
    .table > :not(caption) > * > * {
      color: var(--text-main);
      background-color: transparent;
      border-color: var(--surface-border);
      vertical-align: top;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .table thead th {
      background: var(--header-bg);
      color: var(--header-text);
      font-weight: 600;
      position: sticky;
      top: 0;
    }
  </style>
</head>
<body>
<main class="export-wrap">
  <section class="export-card">
    <header class="export-header">
      <h1 class="export-title">IBM i / DB2 for i Query Export</h1>
      <p class="export-subtitle">Generated by zeus-ibmi-extract-transform | Rows: 2</p>
    </header>
    <div class="table-wrap table-responsive">
      <table class="table table-striped table-hover table-bordered align-middle">
        <thead>
          <tr>
            <th scope="col" title="JDBC Type: INTEGER">ID</th>
            <th scope="col" title="JDBC Type: VARCHAR">NAME</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Alice</td>
          </tr>
          <tr>
            <td>2</td>
            <td>Bob|Builder;&quot;X&quot;</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
</body>
</html>
