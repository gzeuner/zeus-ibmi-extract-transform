name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build
        run: ./mvnw -B verify

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/zeus-ibmi-extract-transform-*.jar
          generate_release_notes: true