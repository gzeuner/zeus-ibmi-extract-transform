name: Maven Verify

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify with Maven Wrapper
        if: ${{ hashFiles('mvnw') != '' }}
        run: ./mvnw verify

      - name: Verify with Maven
        if: ${{ hashFiles('mvnw') == '' }}
        run: mvn verify
